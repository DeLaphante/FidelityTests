<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Focus Trap Bug</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 40px;
            max-width: 700px;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            margin-right: 15px;
            margin-top: 20px;
        }

        #status {
            margin-top: 30px;
            font-weight: bold;
            color: darkred;
        }

        /*
            Invisible overlay
        */
        #overlay {

            position: absolute;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0,0,0,0);

            z-index: 9999;

            display: none;

            pointer-events: auto;
        }

        /*
            Hidden focus trap
        */
        #focusTrap {

            position: absolute;

            top: 50%;
            left: 50%;

            transform:
                translate(-50%, -50%);

            width: 250px;

            padding: 15px;

            font-size: 18px;

            opacity: 0;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Overlay Focus Trap Bug</h1>

    <p>
        Clicking the first button accidentally creates
        an invisible overlay that traps keyboard focus
        and blocks interaction with the second button.
    </p>

    <button id="button1">

        Open Modal

    </button>

    <button id="button2">

        Confirm Action

    </button>

    <div id="status">

        Waiting...

    </div>

    <div id="overlay">

        <!-- Hidden focus target -->
        <input
            id="focusTrap"
            type="text"
            placeholder="Hidden trap"
        >

    </div>

</div>

<script>

    const button1 =
        document.getElementById("button1");

    const button2 =
        document.getElementById("button2");

    const overlay =
        document.getElementById("overlay");

    const focusTrap =
        document.getElementById("focusTrap");

    const status =
        document.getElementById("status");

    /*
        BUG:
        Overlay appears and steals focus
    */

    button1.addEventListener("click", () => {

        overlay.style.display = "block";

        status.innerText =
            "Invisible overlay appeared and trapped focus";

        // Force focus into hidden overlay field
        focusTrap.focus();

        /*
            Aggressive focus trap:
            keep forcing focus back
        */
        document.addEventListener(
            "focusin",
            trapFocus
        );

        // Overlay disappears later
        setTimeout(() => {

            overlay.style.display = "none";

            document.removeEventListener(
                "focusin",
                trapFocus
            );

            status.innerText =
                "Overlay disappeared after 5 seconds";

        }, 5000);
    });

    function trapFocus(event)
    {
        if (
            overlay.style.display === "block" &&
            event.target !== focusTrap
        )
        {
            focusTrap.focus();

            status.innerText =
                "Focus forced back into invisible overlay";
        }
    }

    /*
        Intended action
    */

    button2.addEventListener("click", () => {

        status.innerText =
            "Second button clicked successfully";
    });

</script>

</body>
</html>
