<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transient Overlay Bug Between Clicks</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 40px;
            max-width: 700px;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            margin-right: 15px;
            margin-top: 20px;
        }

        #status {
            margin-top: 30px;
            font-weight: bold;
            color: darkred;
        }

        /*
            Invisible blocking overlay
        */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: rgba(255,0,0,0);

            z-index: 9999;

            pointer-events: auto;

            display: none;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Transient Overlay Bug</h1>

    <p>
        Clicking the first button accidentally creates an invisible overlay
        that blocks the second button for 5 seconds.
    </p>

    <button id="button1">
        Open Modal
    </button>

    <button id="button2">
        Confirm Action
    </button>

    <div id="status">
        Waiting...
    </div>

    <div id="overlay"></div>

</div>

<script>

    const button1 = document.getElementById("button1");
    const button2 = document.getElementById("button2");
    const overlay = document.getElementById("overlay");
    const status = document.getElementById("status");

    // First click accidentally leaves overlay behind
    button1.addEventListener("click", () => {

        status.innerText =
            "Invisible overlay appeared";

        overlay.style.display = "block";

        // Overlay disappears after 5 seconds
        setTimeout(() => {

            overlay.style.display = "none";

            status.innerText =
                "Overlay disappeared after 5 seconds";

        }, 5000);
    });

    // Actual target action
    button2.addEventListener("click", () => {

        status.innerText =
            "Second button was clicked successfully";
    });

</script>

</body>
</html>
