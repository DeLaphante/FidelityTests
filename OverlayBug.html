<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay Focus Trap Bug</title>

    <style>

        body {

            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 50px;
        }

        .container {

            background: white;
            padding: 40px;
            max-width: 700px;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {

            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
            margin-right: 15px;
            margin-top: 20px;
        }

        #status {

            margin-top: 30px;
            font-weight: bold;
            color: darkred;
        }

        /*
            MUCH MORE AGGRESSIVE OVERLAY
        */
        #overlay {

            position: fixed;

            inset: 0;

            width: 100vw;
            height: 100vh;

            background: rgba(0,0,0,0);

            z-index: 999999;

            display: none;

            pointer-events: all;
        }

        /*
            Hidden focus trap
        */
        #focusTrap {

            position: absolute;

            top: 50%;
            left: 50%;

            transform:
                translate(-50%, -50%);

            width: 250px;

            padding: 15px;

            font-size: 18px;

            opacity: 0;
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Overlay Focus Trap Bug</h1>

    <p>
        Clicking the first button creates
        an invisible overlay that traps keyboard focus
        and blocks interaction with the second button.
    </p>

    <button id="button1">

        Open Modal

    </button>

    <button id="button2">

        Confirm Action

    </button>

    <div id="status">

        Waiting...

    </div>

</div>

<!-- Overlay moved OUTSIDE container -->
<div id="overlay">

    <input
        id="focusTrap"
        type="text"
        placeholder="Hidden trap"
    >

</div>

<script>

    const button1 =
        document.getElementById("button1");

    const button2 =
        document.getElementById("button2");

    const overlay =
        document.getElementById("overlay");

    const focusTrap =
        document.getElementById("focusTrap");

    const status =
        document.getElementById("status");

    /*
        BUG:
        Overlay instantly appears,
        traps focus,
        intercepts clicks
    */

    button1.addEventListener("click", () => {

        /*
            Overlay appears immediately
        */
        overlay.style.display = "block";

        /*
            FORCE browser reflow NOW.
            Makes overlay active immediately.
        */
        overlay.getBoundingClientRect();

        status.innerText =
            "Invisible overlay appeared and trapped focus";

        /*
            Force keyboard focus
            into hidden field
        */
        focusTrap.focus();

        /*
            Aggressive focus trapping
        */
        document.addEventListener(
            "focusin",
            trapFocus,
            true
        );

        /*
            Overlay intercepts ALL clicks
        */
        overlay.addEventListener(
            "click",
            interceptClick,
            true
        );

        /*
            Remove overlay later
        */
        setTimeout(() => {

            overlay.style.display = "none";

            document.removeEventListener(
                "focusin",
                trapFocus,
                true
            );

            overlay.removeEventListener(
                "click",
                interceptClick,
                true
            );

            status.innerText =
                "Overlay disappeared after 5 seconds";

        }, 5000);
    });

    /*
        Focus trap logic
    */
    function trapFocus(event)
    {
        if (
            overlay.style.display === "block" &&
            event.target !== focusTrap
        )
        {
            focusTrap.focus();

            status.innerText =
                "Focus forced back into invisible overlay";
        }
    }

    /*
        Click interception
    */
    function interceptClick(event)
    {
        event.preventDefault();

        event.stopPropagation();

        status.innerText =
            "Overlay intercepted click";
    }

    /*
        Intended action
    */
    button2.addEventListener("click", () => {

        status.innerText =
            "Second button clicked successfully";
    });

</script>

</body>
</html>
