<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Swap Demo</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        button {
            padding: 12px 20px;
            margin-right: 10px;
            font-size: 16px;
        }

        #status {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

    </style>

</head>
<body>

<button>

    Submit Order

</button>

<button>

    Cancel Order

</button>

<div id="status">

    Waiting...

</div>

<script>

    const leftButton =
        document.querySelectorAll("button")[0];

    const rightButton =
        document.querySelectorAll("button")[1];

    const status =
        document.getElementById("status");

    let swapped = false;

    function bindEvents()
    {
        const submitButton =
            document.getElementById("submitBtn");

        const cancelButton =
            document.getElementById("cancelBtn");

        submitButton.onclick = () => {

            status.innerText =
                "Order Submitted";
        };

        cancelButton.onclick = () => {

            status.innerText =
                "Order Cancelled";
        };
    }

    function swapIds()
    {
        swapped = !swapped;

        if (swapped)
        {
            /*
                IDs swapped
            */

            leftButton.id =
                "cancelBtn";

            leftButton.title =
                "Cancel";

            rightButton.id =
                "submitBtn";

            rightButton.title =
                "Submit";
        }
        else
        {
            /*
                IDs normal
            */

            leftButton.id =
                "submitBtn";

            leftButton.title =
                "Submit";

            rightButton.id =
                "cancelBtn";

            rightButton.title =
                "Cancel";
        }

        bindEvents();
    }

    /*
        Initial state
    */

    swapIds();

    /*
        Continuously mutate IDs
        every millisecond
    */

    setInterval(() => {

        swapIds();

    }, 1);

</script>

</body>
</html>
