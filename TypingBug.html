<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interaction Fidelity Test</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f4f4f4;
        }

        .container {
            background: white;
            padding: 30px;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input,
        button {
            display: block;
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            font-size: 16px;
        }

        .status {
            margin-top: 20px;
            font-weight: bold;
            color: darkred;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Interaction Fidelity Test</h1>

    <p>
        Real keyboard typing is intentionally broken.
    </p>

    <input
        id="problemInput"
        type="text"
        tabindex="-1"
        placeholder="Typing is blocked"
    >

    <button
        id="problemButton"
        tabindex="-1">
        Hidden From TAB Order
    </button>

    <a href="#">Focusable Link</a>

    <div class="status" id="status">
        Waiting...
    </div>

</div>

<script>

    const input = document.getElementById("problemInput");
    const button = document.getElementById("problemButton");
    const status = document.getElementById("status");

    // Block ALL keyboard typing
    input.addEventListener("keydown", function (e) {

        e.preventDefault();

        status.innerText =
            "keydown blocked -> " + e.key;
    });

    // Track mutations
    input.addEventListener("input", function () {

        status.innerText =
            "Input value became: " + input.value;
    });

    // Track button click
    button.addEventListener("click", function () {

        status.innerText =
            "Button clicked";
    });

</script>

</body>
</html>
